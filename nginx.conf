server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression - reduces file sizes by ~70%
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets aggressively (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any route that doesn't match a file
    # gets served index.html so React Router handles it.
    # Without this, refreshing /dashboard would return 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
